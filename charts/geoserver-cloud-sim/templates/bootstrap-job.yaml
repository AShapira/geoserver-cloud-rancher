apiVersion: batch/v1
kind: Job
metadata:
  name: gscloud-bootstrap
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gscloud-bootstrap
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      containers:
        - name: bootstrap
          image: {{ .Values.bootstrap.image | quote }}
          command: ["sh", "/config/bootstrap.sh"]
          env:
            - name: GS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: geoserver-admin-username
            - name: GS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: geoserver-admin-password
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: pgconfig-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: pgconfig-password
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: gscloud-bootstrap
