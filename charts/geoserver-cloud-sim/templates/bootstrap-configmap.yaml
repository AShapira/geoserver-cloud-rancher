apiVersion: v1
kind: ConfigMap
metadata:
  name: gscloud-bootstrap
data:
  demo-places.yaml: |
    apiVersion: airgap.geoserver/v1
    kind: DatasetRelease
    spec:
      collection:
        id: demo-places
        title: Air-gap Demo Places
        description: Three demonstration cities published as an immutable vector release.
        license: CC0-1.0
        keywords: [cities, demo, vector]
        providers:
          - name: GeoServer Cloud Rancher Demo
            roles: [producer, host]
      release:
        version: "1.0.0"
        datetime: "2026-06-13T00:00:00Z"
      source:
        type: vector
      publication:
        workspace: demo
  demo-raster.yaml: |
    apiVersion: airgap.geoserver/v1
    kind: DatasetRelease
    spec:
      collection:
        id: demo-raster
        title: Air-gap Demo Raster
        description: Small generated GeoTIFF normalized to COG and published through GeoServer.
        license: CC0-1.0
        keywords: [demo, raster, cog]
        providers:
          - name: GeoServer Cloud Rancher Demo
            roles: [producer, host]
      release:
        version: "1.0.0"
        datetime: "2026-06-13T00:00:00Z"
      source:
        type: raster
      publication:
        workspace: demo
  bootstrap.sh: |
    #!/bin/sh
    set -eu
    python /app/generate_demo.py /work
    python /app/publisher.py publish --manifest /config/demo-places.yaml --source /work/demo-places.geojson
    python /app/publisher.py publish --manifest /config/demo-raster.yaml --source /work/demo-elevation.tif
    echo "GeoServer and STAC demo releases are ready"
