{{- define "gscloud.stacGatewayConfig" -}}
server {
  listen 8080;
  server_name _;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /stac { return 308 /stac/; }
  location /stac/ {
    limit_except GET HEAD OPTIONS { deny all; }
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://gscloud-stac-browser:8080/;
  }

  location = /api/stac { return 308 /api/stac/; }
  location = /api/stac/search {
    limit_except GET POST OPTIONS { deny all; }
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api/stac;
    proxy_pass http://gscloud-stac-api:8080/search;
  }
  location /api/stac/ {
    limit_except GET HEAD OPTIONS { deny all; }
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api/stac;
    proxy_pass http://gscloud-stac-api:8080/;
  }

  location /stac-assets/ {
    limit_except GET HEAD OPTIONS { deny all; }
    alias /data/assets/;
    autoindex off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gscloud-stac-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gscloud-stac-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gscloud-stac-api
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ .Values.stac.apiImage | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PGHOST
              value: {{ .Values.stac.pgstacHost | quote }}
            - name: PGPORT
              value: {{ .Values.stac.pgstacPort | quote }}
            - name: PGDATABASE
              value: {{ .Values.stac.pgstacDatabase | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: stac-username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: stac-password
            - name: DB_MIN_CONN_SIZE
              value: "1"
            - name: DB_MAX_CONN_SIZE
              value: "10"
            - name: ROOT_PATH
              value: /api/stac
            - name: STAC_FASTAPI_TITLE
              value: GeoServer Cloud STAC API
            - name: STAC_FASTAPI_DESCRIPTION
              value: Immutable vector and raster releases published through GeoServer Cloud.
            - name: STAC_FASTAPI_LANDING_ID
              value: geoserver-cloud-stac
            - name: ENABLE_TRANSACTIONS_EXTENSIONS
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.stac.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: gscloud-stac-api
spec:
  selector:
    app.kubernetes.io/name: gscloud-stac-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gscloud-stac-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gscloud-stac-browser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gscloud-stac-browser
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: browser
          image: {{ .Values.stac.browserImage | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.stac.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gscloud-stac-browser
spec:
  selector:
    app.kubernetes.io/name: gscloud-stac-browser
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gscloud-stac-gateway
data:
  default.conf: |
{{ include "gscloud.stacGatewayConfig" . | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gscloud-stac-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gscloud-stac-gateway
  template:
    metadata:
      annotations:
        checksum/config: {{ include "gscloud.stacGatewayConfig" . | sha256sum }}
      labels:
        app.kubernetes.io/name: gscloud-stac-gateway
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: {{ .Values.stac.gatewayImage | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.stac.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: geodata
              mountPath: /data
              readOnly: true
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: gscloud-stac-gateway
        - name: geodata
          persistentVolumeClaim:
            claimName: gscloud-geodata
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gscloud-stac-gateway
spec:
  selector:
    app.kubernetes.io/name: gscloud-stac-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gscloud-stac
spec:
  tls:
    - hosts:
        - {{ .Values.stac.host }}
      secretName: {{ .Values.stac.tlsSecret }}
  rules:
    - host: {{ .Values.stac.host }}
      http:
        paths:
          - path: /stac
            pathType: Prefix
            backend:
              service:
                name: gscloud-stac-gateway
                port:
                  name: http
          - path: /api/stac
            pathType: Prefix
            backend:
              service:
                name: gscloud-stac-gateway
                port:
                  name: http
          - path: /stac-assets
            pathType: Prefix
            backend:
              service:
                name: gscloud-stac-gateway
                port:
                  name: http
