apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gscloud-qgis-profile
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.qgis.profileStorage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gscloud-qgis
  labels:
    app.kubernetes.io/name: gscloud-qgis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gscloud-qgis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gscloud-qgis
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qgis
          image: {{ .Values.qgis.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: https-vnc
              containerPort: 6901
          env:
            - name: VNC_PW
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: qgis-password
            - name: POSTGIS_HOST
              value: {{ .Values.qgis.postgisHost | quote }}
            - name: POSTGIS_PORT
              value: {{ .Values.qgis.postgisPort | quote }}
            - name: POSTGIS_DATABASE
              value: {{ .Values.qgis.postgisDatabase | quote }}
            - name: POSTGIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: pgconfig-username
            - name: POSTGIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: pgconfig-password
            - name: GEOSERVER_INTERNAL_URL
              value: {{ .Values.qgis.geoserverInternalUrl | quote }}
            - name: GEOSERVER_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: geoserver-admin-username
            - name: GEOSERVER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gscloud-runtime
                  key: geoserver-admin-password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: https-vnc
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: https-vnc
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.qgis.resources | nindent 12 }}
          volumeMounts:
            - name: profile
              mountPath: /home/kasm-user
            - name: geodata
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: profile
          persistentVolumeClaim:
            claimName: gscloud-qgis-profile
        - name: geodata
          persistentVolumeClaim:
            claimName: gscloud-geodata
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gscloud-qgis
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: {{ .Release.Namespace }}-gscloud-qgis-transport@kubernetescrd
spec:
  selector:
    app.kubernetes.io/name: gscloud-qgis
  ports:
    - name: https
      port: 443
      targetPort: https-vnc
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: gscloud-qgis-transport
spec:
  insecureSkipVerify: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gscloud-qgis
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.qgis.host }}
      secretName: {{ .Values.qgis.tlsSecret }}
  rules:
    - host: {{ .Values.qgis.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gscloud-qgis
                port:
                  name: https
