apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "platform-infra.fullname" . }}-rabbitmq
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  serviceName: {{ include "platform-infra.fullname" . }}-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: rabbitmq
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      initContainers:
        - name: prepare-data
          image: {{ .Values.images.busybox | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              chown -R 999:999 /var/lib/rabbitmq
              if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then
                chmod 600 /var/lib/rabbitmq/.erlang.cookie
              fi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: {{ .Values.images.rabbitmq | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: rabbitmq-username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: rabbitmq-erlang-cookie
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.rabbitmq.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
