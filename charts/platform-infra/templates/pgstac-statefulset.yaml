apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgstac
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgstac
spec:
  serviceName: {{ include "platform-infra.fullname" . }}-pgstac
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pgstac
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pgstac
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        fsGroup: 999
      containers:
        - name: pgstac
          image: {{ .Values.images.pgstac | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: stac-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: stac-password
            - name: POSTGRES_DB
              value: {{ .Values.pgstac.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pgstac.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.pgstac.storage }}
