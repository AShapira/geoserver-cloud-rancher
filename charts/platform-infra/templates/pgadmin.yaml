apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgadmin
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.pgadmin.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgadmin
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pgadmin
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pgadmin
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 5050
        runAsGroup: 0
        fsGroup: 5050
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgadmin
          image: {{ .Values.images.pgadmin | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: {{ .Values.pgadmin.email | quote }}
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: pgadmin-password
            - name: PGADMIN_DISABLE_POSTFIX
              value: "1"
            - name: PGADMIN_LISTEN_PORT
              value: "8080"
            - name: PGADMIN_REPLACE_SERVERS_ON_STARTUP
              value: "True"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
            - name: PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED
              value: "False"
            - name: PGADMIN_CONFIG_SHOW_GRAVATAR_IMAGE
              value: "False"
            - name: PGPASS_FILE
              value: /run/secrets/pgpass
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.pgadmin.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: config
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true
            - name: credentials
              mountPath: /run/secrets/pgpass
              subPath: pgadmin-pgpass
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "platform-infra.fullname" . }}-pgadmin
        - name: config
          configMap:
            name: {{ include "platform-infra.fullname" . }}-pgadmin
        - name: credentials
          secret:
            secretName: {{ include "platform-infra.fullname" . }}-secrets
            defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgadmin
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgadmin
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.pgadmin.host }}
      secretName: {{ .Values.pgadmin.tlsSecret }}
  rules:
    - host: {{ .Values.pgadmin.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "platform-infra.fullname" . }}-pgadmin
                port:
                  name: http
