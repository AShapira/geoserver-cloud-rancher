apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "platform-infra.fullname" . }}-postgis
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgis
spec:
  serviceName: {{ include "platform-infra.fullname" . }}-postgis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgis
    spec:
      imagePullSecrets:
        - name: {{ .Values.registry.pullSecret }}
      securityContext:
        fsGroup: 999
      containers:
        - name: postgis
          image: {{ .Values.images.postgis | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: postgres-super-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: postgres-super-password
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: GEOSERVER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: geoserver-username
            - name: GEOSERVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform-infra.fullname" . }}-secrets
                  key: geoserver-password
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d/01-init-geoserver.sh
              subPath: 01-init-geoserver.sh
      volumes:
        - name: init
          configMap:
            name: {{ include "platform-infra.fullname" . }}-postgis-init
            defaultMode: 0555
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgis.storage }}
