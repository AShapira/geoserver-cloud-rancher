apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.fullname" . }}-postgis
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgis
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.fullname" . }}-rabbitmq
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.fullname" . }}-pgstac
  labels:
    {{- include "platform-infra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pgstac
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
