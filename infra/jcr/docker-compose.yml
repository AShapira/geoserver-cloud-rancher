services:
  jcr-db:
    image: postgres:16-alpine
    container_name: gscloud-jcr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: artifactory
      POSTGRES_USER: ${JCR_DB_USERNAME}
      POSTGRES_PASSWORD: ${JCR_DB_PASSWORD}
    volumes:
      - ${STATE_DIR}/jcr-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JCR_DB_USERNAME} -d artifactory"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - bootstrap
      - runtime

  artifactory:
    image: releases-docker.jfrog.io/jfrog/artifactory-jcr@sha256:f7a6173eb6886a9ed0383c0008b93d9a1be11faf763d19785b45c550a922b8b5
    container_name: gscloud-jcr
    restart: unless-stopped
    depends_on:
      jcr-db:
        condition: service_healthy
    environment:
      JF_ROUTER_ENTRYPOINTS_EXTERNALPORT: "8082"
      EXTRA_JAVA_OPTIONS: "-Xms1g -Xmx3g"
    volumes:
      - ${STATE_DIR}/jcr:/var/opt/jfrog/artifactory
    networks:
      - bootstrap
      - runtime

  jcr-proxy:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: gscloud-jcr-proxy
    restart: unless-stopped
    depends_on:
      - artifactory
    ports:
      - "5443:8443"
      - "127.0.0.1:5080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STATE_DIR}/certs/server.crt:/etc/nginx/tls/tls.crt:ro
      - ${STATE_DIR}/certs/server.key:/etc/nginx/tls/tls.key:ro
    networks:
      - bootstrap
      - runtime

networks:
  bootstrap:
    external: true
    name: ${AIRGAP_BOOTSTRAP_NETWORK}
  runtime:
    external: true
    name: ${AIRGAP_RUNTIME_NETWORK}
